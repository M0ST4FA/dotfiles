- name: Symlink wallpaper directories
  tags: misc
  ansible.builtin.file:
    src: "/home/{{ system_user }}/dotfiles/ansible/roles/thelaptop/files/wallpapers/{{ item }}"
    dest: "/usr/share/wallpapers/{{ item }}"
    state: link
    force: true
  loop:
    - Nord
    - AltNord
    - Favorites
    - ArchPapers
  become: true

- name: Install zinit
  tags: misc
  ansible.builtin.git:
    repo: "https://github.com/zdharma-continuum/zinit.git"
    dest: "/home/{{ system_user }}/.local/share/zinit"
    depth: 1
  become: false
