general {
	gaps_in = 2
	gaps_out = 4

	border_size = 2

# https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
# Original: rgba(33ccffee) rgba(00ff99ee) 
	col.active_border = $borderColor1 $borderColor2 45deg
	col.inactive_border = $borderColorInactive

# Set to true enable resizing windows by clicking and dragging on borders and gaps
	resize_on_border = true

# Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
	allow_tearing = true

	layout = scrolling

	no_focus_fallback = true

	snap {
		enabled = true
		respect_gaps = true
	}
}

group {
# Border around a group
# col.border_active =  rgba(33ccffee) rgba(00ff99ee) 45deg 

	col.border_active =  $groupBorderColor1 $groupBorderColor2 45deg 
	col.border_inactive = $groupBorderColorInactive1 $groupBorderColorInactive2 45deg

	groupbar {
		col.active = $groupIndicatorColor
		col.inactive = $groupIndicatorColorInactive

		render_titles = false
		height = 0
		rounding = 5
	}
}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
	# pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
	preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
	new_status = master
}

scrolling {
	# pseudo_tiling = false
	# focus_on_activate = true
	column_width = 0.8
	focus_fit_method = 1
	direction = down
}
