animations {
  enabled = true

  # ─── Bezier Curves (physics-aware) ───────────────────────
  bezier = navigation, 0.3, 1, 0.6, 1        # precise, no bounce
  bezier = softSpring, 0.35, 1.2, 0.35, 1     # very subtle spring
  bezier = strongSpring, 0.4, 1.5, 0.5, 1     # controlled bounce
  bezier = fast, 0.2, 0.8, 0.3, 1             # fades

  # ─── Global ──────────────────────────────────────────────
  animation = global, 1, 4.5, navigation

  # ─── Borders (must be stable) ────────────────────────────
  animation = border, 1, 3.5, navigation
  animation = borderangle, 1, 3.5, navigation

  # ─── Windows (entry = spring, movement = stable) ─────────
  animation = windows, 1, 4.0, navigation
  animation = windowsIn, 1, 4.5, strongSpring, popin 90%
  animation = windowsOut, 1, 3.5, softSpring, popin 90%

  # ─── Fades (very fast, invisible) ────────────────────────
  animation = fade, 1, 2.0, fast
  animation = fadeIn, 1, 1.8, fast
  animation = fadeOut, 1, 1.8, fast

  # ─── Layers (minimal spring) ─────────────────────────────
  animation = layers, 1, 3.2, navigation
  animation = layersIn, 1, 3.5, softSpring, fade
  animation = layersOut, 1, 2.8, navigation, fade

  # ─── Workspaces (CRITICAL for scrolling) ─────────────────
  animation = workspaces, 1, 4.0, navigation, slide
  animation = workspacesIn, 1, 4.0, navigation, slide
  animation = workspacesOut, 1, 4.0, navigation, slide

  # ─── Zoom ────────────────────────────────────────────────
  animation = zoomFactor, 1, 2.2, fast
}
