# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us,ara,es
    kb_variant =
    kb_model =
    kb_options = grp:alt_shift_toggle,keypad:pointerkeys
    kb_rules = 

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    accel_profile = flat

    touchpad {
        natural_scroll = true
        scroll_factor = 0.3
    }

    tablet {
      transform = 0
      output = DP-1
    }
}

device {
	name = razer-razer-deathadder-v2
	scroll_factor = 0.7
}
