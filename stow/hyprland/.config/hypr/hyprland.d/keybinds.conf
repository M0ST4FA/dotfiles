###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

# ── Applications ─────────────────────────────────────────────
bind = $mainMod,       T,     exec, $terminal
bind = $mainMod,       B,     exec, $browser
bind = $mainMod,       E,     exec, $fileManager
bind = $mainMod,       PERIOD, exec, $emojiPicker
bind = $mainMod,       V,     exec, $clipboardMenu
bind = $mainMod,       COMMA, exec, $toggleSettings
bind = $mainMod,       N,     exec, $toggleNotification
bind = $mainMod SHIFT, I,     exec, $toggleBar
bind = ALT,            SPACE, exec, $menu

# ── Screenshots ───────────────────────────────────────────────
bind =      , PRINT, exec, grimblast --notify copysave output
bind = SHIFT, PRINT, exec, grimblast --notify copysave area
bind = CTRL , PRINT, exec, grimblast --notify edit	  output	 
bind = ALT  , PRINT, exec, grimblast --notify copysave active

# --- OCR -----------------------------------------------------
bind = $mainMod SHIFT, T,	  exec, ~/.config/hypr/scripts/ocr.sh

# ── Session / WM ─────────────────────────────────────────────
bind = $mainMod,       Q,     killactive,
bind = $mainMod,       X,     exec, $togglePowerMenu
# bind = $mainMod SHIFT, P,     exec, sleep 1 && hyprctl dispatch dpms off
bind = $mainMod ALT,   L,     exec, $lockScreen
# NOTE: avoid using exit dispatcher - use your session manager instead
# bind = CTRL ALT, DELETE, exec, uwsm stop

# ── Maximize / Fullscreen ─────────────────────────────────────
bind = $mainMod,       F,     fullscreen, 1 # maximize
bind = $mainMod SHIFT, F,     fullscreen, 0 # fullscreen

# ── Floating ─────────────────────────────────────────────────
bind = $mainMod,       W,     togglefloating,
# Mod+Shift+W: toggle focus between floating and tiling
bind = $mainMod SHIFT, W,     layoutmsg, focus float   # focus first floating window

# ── Groups (tabbed columns) ──
bind = $mainMod,       G,     togglegroup,

# Inside a group: cycle active tab
bind = $mainMod SHIFT,   H,     changegroupactive, b
bind = $mainMod SHIFT,   L,     changegroupactive, f

# ── Overview ─────────────────────────
# bind = $mainMod,       O,     overview, toggle         # requires hyprland-overview or hyprexpo

# ── Column / window size ───────
# colresize takes a fraction: 0.1 ≈ 10% of monitor width/height (depending on scrolling direction)
bind = $mainMod,       MINUS, layoutmsg, colresize -0.05
bind = $mainMod,       EQUAL, layoutmsg, colresize +0.05

# Cycle preset column sizes
bind = $mainMod,        R,     layoutmsg, colresize +conf
bind = $mainMod SHIFT,  R,     layoutmsg, colresize -conf   # reset / cycle back

# Expand to fill available space
bind  = $mainMod CTRL, F,     layoutmsg, fit visible

# ── Window height  ──────────────
# resizeactive with percentage of window height
bind = $mainMod SHIFT, MINUS, resizeactive, -5% 0
bind = $mainMod SHIFT, EQUAL, resizeactive, 5%  0

bind = $mainMod CTRL,  MINUS, resizeactive, 0 -5%
bind = $mainMod CTRL,  EQUAL, resizeactive, 0 5%

# ── Focus movement ────────────────────────────────────────────
# focus moves within column, not between columns
bind = $mainMod, H,    layoutmsg, focus l
bind = $mainMod, L,    layoutmsg, focus r
bind = $mainMod, K,    layoutmsg, focus u
bind = $mainMod, J,    layoutmsg, focus d

# ── Move windows ──────────────────────────────────────────────
# K/J: swap columns (direction depends on scrolling direction)
bind = $mainMod SHIFT, K,     layoutmsg, swapcol l
bind = $mainMod SHIFT, J,     layoutmsg, swapcol r

# move window between columns
bind = $mainMod SHIFT,  bracketright, movewindow, u
bind = $mainMod SHIFT,  bracketleft,  movewindow, d
bind = $mainMod,        bracketright, movewindow, l
bind = $mainMod,        bracketleft,  movewindow, r

bind = ALT,             TAB,          cyclenext,  hist

# ── Center (floating windows only) ─────
bind = $mainMod,      C,      centerwindow,

# ── Workspaces ────────────────────────────────────────────────
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod CTRL, H,   workspace, r-1
bind = $mainMod CTRL, L,   workspace, r+1
bind = $mainMod,      TAB, workspace, previous

# ── Move window to workspace ─
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

# ── Move entire column to workspace ──
# movecoltoworkspace keeps all windows in the column together
bind = $mainMod CTRL, 1, layoutmsg, movecoltoworkspace 1
bind = $mainMod CTRL, 2, layoutmsg, movecoltoworkspace 2
bind = $mainMod CTRL, 3, layoutmsg, movecoltoworkspace 3
bind = $mainMod CTRL, 4, layoutmsg, movecoltoworkspace 4
bind = $mainMod CTRL, 5, layoutmsg, movecoltoworkspace 5
bind = $mainMod CTRL, 6, layoutmsg, movecoltoworkspace 6
bind = $mainMod CTRL, 7, layoutmsg, movecoltoworkspace 7
bind = $mainMod CTRL, 8, layoutmsg, movecoltoworkspace 8
bind = $mainMod CTRL, 9, layoutmsg, movecoltoworkspace 9

# ── Mouse drag ────────────────────────────────────────────────
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- Zoom -----------------------------------------------------
binde = $mainMod SHIFT, COMMA, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float * 1.2')
binde = $mainMod SHIFT, PERIOD, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float * 0.80) | if . < 1 then 1 else . end')

# ── Multimedia ────────────────────────────────────────────────
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl  = , XF86AudioPlay,         exec, playerctl play-pause
bindl  = , XF86AudioStop,         exec, playerctl stop
bindl  = , XF86AudioPrev,         exec, playerctl previous
bindl  = , XF86AudioNext,         exec, playerctl next
bindel = , XF86MonBrightnessUp,   exec, brightnessctl --class=backlight set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl --class=backlight set 5%-
